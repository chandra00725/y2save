version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youtube_downloader_app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - RATE_LIMIT_MAX_INFO=15
      - RATE_LIMIT_MAX_DOWNLOAD=5
      - RATE_LIMIT_DURATION_MS=60000
    volumes:
      # Sync downloaded files from the docker app directory to the host system
      # Map the downloads directory dynamically to host path
      - downloads_data:/app/Downloads
    restart: always

volumes:
  downloads_data:
    driver: local
